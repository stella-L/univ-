                        "surface-container": "#f0ede9",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .viewfinder-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 80%, rgba(0,0,0,0.6) 100%);
        }
        .shutter-btn:active {
            transform: scale(0.9);
            transition: transform 0.1s ease-out;
        }
        .focus-bracket {
            border: 2px solid rgba(161, 215, 174, 0.6);
            background: rgba(45, 95, 63, 0.15);
            backdrop-filter: blur(2px);
        }
        @keyframes pulse-focus {
            0%, 100% { border-color: rgba(161, 215, 174, 0.6); }
            50% { border-color: rgba(161, 215, 174, 0.9); }
        }
        .animate-focus {
            animation: pulse-focus 2s infinite ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black text-on-surface overflow-hidden h-screen w-screen font-body-md">
<!-- Main Viewfinder Container -->
<main class="relative h-screen w-screen flex flex-col items-center justify-between overflow-hidden">
<!-- Live View Background Image -->
<div class="absolute inset-0 z-0 overflow-hidden">
<img alt="Camera Viewfinder" class="w-full h-full object-cover" data-alt="A lush green forest scene viewed through a high-end camera lens. Dense sunlight filters through a canopy of oak and pine trees, creating soft dappled light on the forest floor. The scene is characterized by deep forest greens and warm golden highlights, maintaining a scholarly and serene ornithological aesthetic. The composition is wide, showing the expansive beauty of a natural woodland habitat at dawn." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-mPLUzcI0iOX7EQG06n4WGwvEKJUHm1mygbSwP1iqVwlECVk5OJr_f3Mzr8zRs7XtTsy6fzzPQl267jw8l1PZP5XYdEp6bDbwwcMTyBSTFmzznP0tga25FvfujHlu4VvzoPdCb_1ovu42hst6wDl_UXqyPKK4wRo00D-V1VacI1RfbbLwVUmsm-6JaI75Mvh-Xfn7cGahFx6qQSE0Izotq8IB7c8lEuJz5Ff94-ooDzOtXN3o9xCiHjMRuzHEhtiUuh77ZvIhw1Oy"/>
<div class="absolute inset-0 viewfinder-overlay"></div>
</div>
<!-- Top Controls (Transactional - Hide Shell) -->
<header class="relative z-20 w-full flex justify-between items-center px-margin-mobile pt-unit-12 pb-unit-4">
<button aria-label="Close" class="w-10 h-10 flex items-center justify-center rounded-full bg-black/40 backdrop-blur-md text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined">close</span>
</button>
<button class="flex items-center gap-unit-2 px-unit-4 py-unit-2 rounded-full bg-black/40 backdrop-blur-md text-white active:scale-95 transition-transform border border-white/10">
<span class="material-symbols-outlined">photo_library</span>
<span class="font-label-sm text-label-sm">Gallery</span>
</button>
</header>
<!-- Central Focus Guide -->
<div class="relative z-10 flex-1 w-full flex items-center justify-center px-unit-12">
<div class="focus-bracket animate-focus w-full aspect-square max-w-[320px] rounded-3xl flex flex-col items-center justify-center relative">
<!-- Decorative Corners -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary-fixed rounded-tl-3xl"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary-fixed rounded-tr-3xl"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary-fixed rounded-bl-3xl"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary-fixed rounded-br-3xl"></div>
<span class="text-white font-label-sm text-label-sm tracking-widest text-center px-unit-6 drop-shadow-md">
                    새를 화면 안에 맞춰주세요
                </span>
</div>
</div>
<!-- Bottom Controls -->
<footer class="relative z-20 w-full px-margin-mobile pb-unit-12 pt-unit-8 flex flex-col items-center gap-unit-8 bg-gradient-to-t from-black/80 to-transparent">
<!-- Shooting Modes (Visual only) -->
<div class="flex gap-unit-6 overflow-x-hidden w-full justify-center">
<span class="text-white/50 font-label-sm text-label-sm">VIDEO</span>
<span class="text-primary-fixed font-label-sm text-label-sm border-b-2 border-primary-fixed pb-unit-1">PHOTO</span>
<span class="text-white/50 font-label-sm text-label-sm">BURST</span>
</div>
<!-- Action Row -->
<div class="w-full flex justify-between items-center max-w-[400px]">
<!-- Thumbnail -->
<div class="w-12 h-12 rounded-lg overflow-hidden border-2 border-white/20 active:scale-95 transition-transform cursor-pointer">
<img alt="Recent Photo" class="w-full h-full object-cover" data-alt="A macro close-up of a colorful tropical bird with vibrant green and red feathers, perched on a mossy branch. The lighting is soft and natural, emphasizing the intricate texture of the plumage. This image represents the latest entry in a user's birdwatching journal, styled with a warm, minimalist, and scholarly aesthetic consistent with high-end nature photography." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXWJvh9wEpZqC-hnliJ9FI_Z8Ak60wb_TZJ4FqEXAvKkW_NR5MhE0e0PDckpVDnQEhuXkDvLRfvyi77MA91Itdt8I2yHyppu44DZEQdla7jva2_pjqiWF06a91S9rmkA3NXnggup3uS2r4Tk2l1b5LCKVTqPYCTmpheckyorAs--w07-U-PhGSoXc6lj8B_PeJhefPawSaNrgpjSjtOjJ7sFc20z3fvYHU0a8xZm4eItrRbU2SIbnH-HJHMh0XWgTuZcLbFKwbJvpu"/>
</div>
<!-- Shutter Button -->
<button class="shutter-btn group relative flex items-center justify-center" id="shutter">
<div class="w-20 h-20 rounded-full border-4 border-white flex items-center justify-center">
<div class="w-[68px] h-[68px] rounded-full bg-white group-active:bg-white/90"></div>
</div>
</button>
<!-- Flash Toggle -->
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-black/40 backdrop-blur-md text-white active:scale-95 transition-transform" id="flash-toggle" onclick="toggleFlash()">
<span class="material-symbols-outlined" id="flash-icon">flash_off</span>
</button>
</div>
</footer>
</main>
<!-- Visual Feedback for Shutter (White Flash) -->
<div class="fixed inset-0 bg-white opacity-0 pointer-events-none z-[100] transition-opacity duration-75" id="flash-overlay"></div>
<script>
        const shutter = document.getElementById('shutter');
        const flashOverlay = document.getElementById('flash-overlay');
        const flashIcon = document.getElementById('flash-icon');
        let isFlashOn = false;

        shutter.addEventListener('click', () => {
            // Trigger haptic simulation / flash
            flashOverlay.style.opacity = '1';
            setTimeout(() => {
                flashOverlay.style.opacity = '0';
            }, 100);
            
            // Audio simulation (optional - just logic placeholder)
            console.log('Photo captured!');
        });

        function toggleFlash() {
            isFlashOn = !isFlashOn;
            if (isFlashOn) {
                flashIcon.innerText = 'flash_on';
                flashIcon.classList.add('text-primary-fixed');
                flashIcon.style.fontVariationSettings = "'FILL' 1";
            } else {
                flashIcon.innerText = 'flash_off';
                flashIcon.classList.remove('text-primary-fixed');
                flashIcon.style.fontVariationSettings = "'FILL' 0";
            }
        }

        // Slight parallax effect on the viewfinder based on device orientation if available
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (event) => {
                const img = document.querySelector('img[alt="Camera Viewfinder"]');
                const x = event.beta / 45; // range ~-1 to 1
                const y = event.gamma / 45; 
                
                img.style.transform = `scale(1.1) translate(${y * 10}px, ${x * 10}px)`;
            });
        }
    </script>
</body></html>
