<!-- Main UI Container -->
<main class="relative z-10 flex flex-col h-screen w-full max-w-[480px] mx-auto overflow-hidden">
<!-- Top App Bar (Skip Button) -->

                건너뛰기

</header>
<!-- Spacer to push content down -->
<div class="flex-grow"></div>
<!-- Bottom Rounded Card -->
<section class="bg-surface onboarding-card-shadow rounded-t-[32px] px-margin-mobile pt-unit-12 pb-unit-8 flex flex-col items-center animate-in slide-in-from-bottom duration-700 ease-out">
<!-- Illustration / Icon Container -->
<div class="relative mb-unit-8 flex items-center justify-center">
<div class="w-24 h-24 bg-surface-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[48px] text-primary" data-icon="camera_enhance">camera_enhance</span>
</div>
<div class="absolute -top-2 -right-2 w-12 h-12 bg-primary-fixed text-on-primary-fixed rounded-full flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-[24px]" data-icon="flutter_dash">flutter_dash</span>
</div>
</div>
<!-- Text Content -->
<div class="text-center mb-unit-8">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-unit-2">
                    새를 만나면, 사진 한 장

<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary text-on-primary py-unit-4 rounded-xl font-headline-lg-mobile text-headline-lg-mobile shadow-md hover:bg-primary-container transition-colors active:scale-95 duration-150">
                다음
            </button>
</section>
</main>
<script>
        // Micro-interactions for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', function() {
                this.classList.add('opacity-80');
            });
            button.addEventListener('touchend', function() {
                this.classList.remove('opacity-80');
            });
        });

        // Subtle parallax or drift effect can be added here if needed
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            const img = document.querySelector('img[data-alt]');
            if (img) {
                img.style.transform = `scale(1.1) translate(${x * 20}px, ${y * 20}px)`;
            }
        });
    </script>
