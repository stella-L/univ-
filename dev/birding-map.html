<script>
        function toggleBottomSheet() {
            const sheet = document.getElementById('bottomSheet');
            if (sheet.classList.contains('bottom-sheet-collapsed')) {
                sheet.classList.remove('bottom-sheet-collapsed');
                sheet.classList.add('bottom-sheet-expanded');
            } else {
                sheet.classList.remove('bottom-sheet-expanded');
                sheet.classList.add('bottom-sheet-collapsed');
            }
        }

        function togglePopup(id) {
            const popup = document.getElementById(id);
            const allPopups = document.querySelectorAll('[id^="popup-"]');
            
            // Hide others
            allPopups.forEach(p => {
                if (p.id !== id) p.classList.add('hidden');
            });

            // Toggle target
            popup.classList.toggle('hidden');
            
            // If opening a popup, also expand the bottom sheet as contextual detail
            if (!popup.classList.contains('hidden')) {
                const sheet = document.getElementById('bottomSheet');
                sheet.classList.remove('bottom-sheet-collapsed');
                sheet.classList.add('bottom-sheet-expanded');
            }
        }

        // Close popups when clicking on map (background)
        document.querySelector('.map-bg').addEventListener('click', (e) => {
            if (e.target.classList.contains('map-bg')) {
                document.querySelectorAll('[id^="popup-"]').forEach(p => p.classList.add('hidden'));
            }
        });
    </script>
