<script>
        // Micro-interaction: Scroll reveal for cards
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('opacity-100', 'translate-y-0');
                    entry.target.classList.remove('opacity-0', 'translate-y-4');
                }
            });
        }, observerOptions);

        document.querySelectorAll('section').forEach(section => {
            section.classList.add('transition-all', 'duration-700', 'opacity-0', 'translate-y-4');
            observer.observe(section);
        });

        // Toggle Active State logic for Nav
        const navItems = document.querySelectorAll('nav a');
        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                navItems.forEach(nav => {
                    nav.classList.remove('bg-primary-container', 'text-on-primary-container', 'rounded-full');
                    nav.classList.add('text-on-surface-variant');
                    const icon = nav.querySelector('.material-symbols-outlined');
                    if(icon) icon.style.fontVariationSettings = "'FILL' 0";
                });
                item.classList.add('bg-primary-container', 'text-on-primary-container', 'rounded-full');
                item.classList.remove('text-on-surface-variant');
                const activeIcon = item.querySelector('.material-symbols-outlined');
                if(activeIcon) activeIcon.style.fontVariationSettings = "'FILL' 1";
            });
        });
    </script>
