<div class="aspect-square bg-surface-container rounded-xl"></div>

<!-- Success Modal Overlay -->

<div class="flex-grow h-2 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-[4.6%] rounded-full transition-all duration-1000 ease-out" id="progressBar"></div>
</div>

</div>

<!-- Actions -->

                    </button>
<button class="w-full py-unit-4 bg-transparent text-on-surface-variant font-semibold rounded-2xl border-2 border-outline-variant hover:bg-surface-container transition-colors active:scale-95">

<script>
        // Progress Bar Animation
        setTimeout(() => {
            document.getElementById('progressBar').style.width = '4.6%';
        }, 500);

        // Feather/Particle Animation
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = Math.random() * 8 + 4;
                this.speed = Math.random() * 2 + 1;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = (Math.random() - 0.5) * 2;
                this.color = Math.random() > 0.5 ? '#134729' : '#b8efc6'; // Primary or Primary-fixed
                this.opacity = Math.random() * 0.5 + 0.3;
                this.horizontalDrift = (Math.random() - 0.5) * 1.5;
            }

            update() {
                this.y += this.speed;
                this.x += this.horizontalDrift;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                
                // Draw a simple feather/leaf shape
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(this.size, this.size / 2, this.size, this.size * 1.5, 0, this.size * 2);
                ctx.bezierCurveTo(-this.size, this.size * 1.5, -this.size, this.size / 2, 0, 0);
                ctx.fill();
                ctx.restore();
            }
        }

        function init() {
            resize();
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        init();
        animate();

        // Interaction for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                // Simple exit transition
                btn.closest('.fixed').classList.add('opacity-0', 'scale-95');
                setTimeout(() => {
                    btn.closest('.fixed').style.display = 'none';
                    document.querySelector('main').classList.remove('blur-sm', 'opacity-50');
                }, 300);
            });
        });
    </script>
